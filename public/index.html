<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatApp</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e40;
    --accent: #7c6fcd;
    --accent2: #a99ff5;
    --text: #e2e2f0;
    --muted: #888899;
    --system: #5fa8d3;
    --danger: #e05c5c;
    --green: #4caf88;
    --radius: 10px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── LOGIN ────────────── */
  #login-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    width: 340px;
    text-align: center;
    box-shadow: 0 8px 40px #0008;
  }
  #login-screen h1 { font-size: 1.8rem; margin-bottom: 6px; color: var(--accent2); }
  #login-screen p { color: var(--muted); margin-bottom: 28px; font-size: .9rem; }
  #login-screen input {
    width: 100%; padding: 11px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 1rem;
    outline: none; margin-bottom: 12px;
    transition: border-color .2s;
  }
  #login-screen input:focus { border-color: var(--accent); }
  #login-screen button {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    font-size: 1rem; cursor: pointer; font-weight: 600;
    transition: background .2s;
  }
  #login-screen button:hover { background: var(--accent2); }
  #login-error { color: var(--danger); font-size: .85rem; margin-top: 10px; min-height: 18px; }

  /* ── MAIN LAYOUT ─────── */
  #app {
    display: none;
    width: 100vw; height: 100vh;
    flex-direction: row;
  }

  /* ── SIDEBAR ─────────── */
  #sidebar {
    width: 220px; min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 14px 10px;
    font-weight: 700; font-size: 1.1rem;
    color: var(--accent2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header span.dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green); display: inline-block;
  }
  .section-label {
    padding: 12px 14px 4px;
    font-size: .72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted);
  }
  .sidebar-list { list-style: none; overflow-y: auto; }
  .sidebar-list li {
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    margin: 2px 6px;
    font-size: .9rem;
    transition: background .15s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-list li:hover { background: var(--surface2); }
  .sidebar-list li.active { background: var(--accent); color: #fff; }
  .sidebar-list li .badge {
    margin-left: auto; background: var(--surface2);
    border-radius: 99px; padding: 1px 7px; font-size: .72rem; color: var(--muted);
  }
  .sidebar-list li.active .badge { background: #ffffff33; color: #fff; }

  #new-room-row {
    padding: 6px 10px; margin: 2px 6px;
    display: flex; gap: 6px;
  }
  #new-room-input {
    flex: 1; padding: 6px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: .85rem; outline: none;
  }
  #new-room-input:focus { border-color: var(--accent); }
  #new-room-btn {
    padding: 6px 10px; background: var(--accent); border: none;
    border-radius: 6px; color: #fff; cursor: pointer; font-size: .85rem;
  }

  .user-item { color: var(--text); }
  .user-item.self { color: var(--accent2); font-weight: 600; }
  .user-item .online-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    flex-shrink: 0;
  }

  /* ── MAIN CHAT ────────── */
  #main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  #chat-header {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 1rem;
  }
  #chat-header .ch-icon {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 1rem; flex-shrink: 0;
  }
  #chat-header .ch-subtitle { font-size: .78rem; color: var(--muted); font-weight: 400; }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 6px;
  }

  .msg {
    max-width: 72%; padding: 9px 14px;
    border-radius: var(--radius);
    font-size: .92rem; line-height: 1.45;
    word-break: break-word;
  }
  .msg .meta {
    font-size: .72rem; color: var(--muted);
    margin-bottom: 3px; display: flex; gap: 8px; align-items: baseline;
  }
  .msg .meta .from { font-weight: 700; color: var(--accent2); }
  .msg.mine { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.mine .meta .from { color: #fff; }
  .msg.mine .meta { color: #ffffffaa; }
  .msg.other { align-self: flex-start; background: var(--surface2); }
  .msg.system-msg {
    align-self: center; background: none;
    color: var(--system); font-size: .82rem; font-style: italic; padding: 2px 0;
  }
  .msg.private-msg {
    border: 1px solid var(--accent);
  }
  .msg.private-badge::before {
    content: "🔒 DM";
    font-size: .7rem; font-weight: 700;
    color: var(--accent2); display: block; margin-bottom: 3px;
  }

  /* empty state */
  #empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 10px;
  }
  #empty-state .big { font-size: 3rem; }
  #empty-state p { font-size: .9rem; }

  /* ── INPUT BAR ────────── */
  #input-bar {
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  #msg-input {
    flex: 1; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: .95rem;
    outline: none; resize: none; max-height: 120px; line-height: 1.4;
    transition: border-color .2s;
    font-family: inherit;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    padding: 10px 18px; background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #fff; font-size: .95rem; cursor: pointer;
    font-weight: 600; transition: background .2s;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: .4; cursor: default; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  @media (max-width: 560px) {
    #sidebar { width: 180px; min-width: 180px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>💬 ChatApp</h1>
  <p>Enter a username to get started</p>
  <input id="username-input" type="text" placeholder="Choose a username…" maxlength="20" autocomplete="off"/>
  <button id="login-btn">Join Chat</button>
  <div id="login-error"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="dot"></span>
      <span id="my-username">You</span>
    </div>

    <div class="section-label">Rooms</div>
    <ul id="room-list" class="sidebar-list"></ul>
    <div id="new-room-row">
      <input id="new-room-input" type="text" placeholder="New room…" maxlength="20"/>
      <button id="new-room-btn" title="Create room">+</button>
    </div>

    <div class="section-label">Online Users</div>
    <ul id="user-list" class="sidebar-list" style="flex:1;overflow-y:auto;"></ul>
  </aside>

  <!-- Chat -->
  <main id="main">
    <div id="chat-header" style="display:none">
      <div class="ch-icon" id="ch-icon">#</div>
      <div>
        <div id="ch-title">general</div>
        <div class="ch-subtitle" id="ch-sub"></div>
      </div>
    </div>

    <div id="empty-state">
      <div class="big">💬</div>
      <p>Select a room or click a user to start chatting</p>
    </div>

    <div id="messages" style="display:none"></div>

    <div id="input-bar" style="display:none">
      <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </main>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────
  let ws;
  let myUsername = "";
  // active: { type: "room"|"dm", id: string }
  let active = null;
  // history per channel   key: "room:general" | "dm:alice"
  const history = {};

  // ── DOM refs ──────────────────────────────────────────────────
  const loginScreen  = document.getElementById("login-screen");
  const usernameInput= document.getElementById("username-input");
  const loginBtn     = document.getElementById("login-btn");
  const loginError   = document.getElementById("login-error");
  const appEl        = document.getElementById("app");
  const myUsernameEl = document.getElementById("my-username");
  const roomListEl   = document.getElementById("room-list");
  const userListEl   = document.getElementById("user-list");
  const newRoomInput = document.getElementById("new-room-input");
  const newRoomBtn   = document.getElementById("new-room-btn");
  const chatHeader   = document.getElementById("chat-header");
  const chIcon       = document.getElementById("ch-icon");
  const chTitle      = document.getElementById("ch-title");
  const chSub        = document.getElementById("ch-sub");
  const emptyState   = document.getElementById("empty-state");
  const messagesEl   = document.getElementById("messages");
  const inputBar     = document.getElementById("input-bar");
  const msgInput     = document.getElementById("msg-input");
  const sendBtn      = document.getElementById("send-btn");

  // ── Helpers ───────────────────────────────────────────────────
  function channelKey(type, id) { return `${type}:${id}`; }

  function getHistory(type, id) {
    const k = channelKey(type, id);
    if (!history[k]) history[k] = [];
    return history[k];
  }

  function pushHistory(type, id, msgObj) {
    getHistory(type, id).push(msgObj);
  }

  function wsSend(obj) { ws.send(JSON.stringify(obj)); }

  // ── Connect WebSocket ─────────────────────────────────────────
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const wsHost = location.hostname + ":3001";
    ws = new WebSocket(`${proto}://${wsHost}`);

    ws.onopen = () => {};

    ws.onmessage = ({ data }) => {
      let msg;
      try { msg = JSON.parse(data); } catch { return; }
      handleMessage(msg);
    };

    ws.onclose = () => {
      appendSystemMsg("Disconnected. Refresh to reconnect.");
    };
  }

  // ── Handle incoming messages ──────────────────────────────────
  function handleMessage(msg) {
    switch (msg.type) {
      case "login_ok":
        myUsername = msg.username;
        myUsernameEl.textContent = myUsername;
        loginScreen.style.display = "none";
        appEl.style.display = "flex";
        break;

      case "error":
        if (!myUsername) {
          loginError.textContent = msg.message;
        }
        break;

      case "rooms":
        renderRooms(msg.rooms);
        break;

      case "users":
        renderUsers(msg.users);
        break;

      case "joined_room":
        // nothing extra needed
        break;

      case "room_message":
        pushHistory("room", msg.room, msg);
        if (active && active.type === "room" && active.id === msg.room) {
          appendRoomMsg(msg);
        }
        if (!active || active.type !== "room" || active.id !== msg.room) {
          markUnread("room", msg.room);
        }
        break;

      case "private_message": {
        const peer = msg.from === myUsername ? msg.to : msg.from;
        pushHistory("dm", peer, msg);
        if (active && active.type === "dm" && active.id === peer) {
          appendPrivateMsg(msg);
        } else {
          markUnread("dm", peer);
        }
        break;
      }

      case "system":
        // Global system messages go to all open channels
        if (active) appendSystemMsg(msg.text, msg.time);
        break;
    }
  }

  // ── Render sidebar ────────────────────────────────────────────
  function renderRooms(rooms) {
    roomListEl.innerHTML = "";
    rooms.forEach(({ name, members }) => {
      const li = document.createElement("li");
      li.dataset.room = name;
      li.innerHTML = `<span>#</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escHtml(name)}</span>
        <span class="badge">${members}</span>`;
      // mark active
      if (active && active.type === "room" && active.id === name) li.classList.add("active");
      li.addEventListener("click", () => openRoom(name));
      roomListEl.appendChild(li);
    });
  }

  function renderUsers(users) {
    userListEl.innerHTML = "";
    users.forEach(u => {
      const li = document.createElement("li");
      li.className = "user-item" + (u === myUsername ? " self" : "");
      li.dataset.user = u;
      li.innerHTML = `<span class="online-dot"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escHtml(u)}</span>
        ${u === myUsername ? "" : "<span style='font-size:.72rem;color:var(--muted)'>DM</span>"}`;
      if (active && active.type === "dm" && active.id === u) li.classList.add("active");
      if (u !== myUsername) li.addEventListener("click", () => openDM(u));
      userListEl.appendChild(li);
    });
  }

  function markUnread(type, id) {
    if (type === "room") {
      const li = roomListEl.querySelector(`[data-room="${id}"]`);
      if (li && !li.classList.contains("active")) {
        li.style.color = "#a99ff5";
        li.style.fontWeight = "700";
      }
    } else {
      const li = userListEl.querySelector(`[data-user="${id}"]`);
      if (li && !li.classList.contains("active")) {
        li.style.color = "#a99ff5";
        li.style.fontWeight = "700";
      }
    }
  }

  // ── Open room / DM ────────────────────────────────────────────
  function openRoom(name) {
    active = { type: "room", id: name };
    wsSend({ type: "join_room", room: name });

    // Highlight sidebar
    roomListEl.querySelectorAll("li").forEach(li => {
      li.classList.toggle("active", li.dataset.room === name);
      if (li.dataset.room === name) { li.style.color = ""; li.style.fontWeight = ""; }
    });
    userListEl.querySelectorAll("li").forEach(li => li.classList.remove("active"));

    chIcon.textContent = "#";
    chTitle.textContent = name;
    chSub.textContent = "public room";
    showChat();

    // Replay history
    messagesEl.innerHTML = "";
    getHistory("room", name).forEach(m => appendRoomMsg(m, false));
    scrollBottom();
  }

  function openDM(username) {
    active = { type: "dm", id: username };

    userListEl.querySelectorAll("li").forEach(li => {
      li.classList.toggle("active", li.dataset.user === username);
      if (li.dataset.user === username) { li.style.color = ""; li.style.fontWeight = ""; }
    });
    roomListEl.querySelectorAll("li").forEach(li => li.classList.remove("active"));

    chIcon.textContent = "👤";
    chTitle.textContent = username;
    chSub.textContent = "private conversation";
    showChat();

    messagesEl.innerHTML = "";
    getHistory("dm", username).forEach(m => appendPrivateMsg(m, false));
    scrollBottom();
  }

  function showChat() {
    emptyState.style.display = "none";
    chatHeader.style.display = "flex";
    messagesEl.style.display = "flex";
    inputBar.style.display = "flex";
    msgInput.focus();
  }

  // ── Append messages ───────────────────────────────────────────
  function appendRoomMsg({ from, text, time }, scroll = true) {
    if (from === "System") { appendSystemMsg(text, time, scroll); return; }
    const mine = from === myUsername;
    const div = document.createElement("div");
    div.className = `msg ${mine ? "mine" : "other"}`;
    div.innerHTML = `<div class="meta"><span class="from">${escHtml(from)}</span><span>${time || ""}</span></div>
      ${escHtml(text)}`;
    messagesEl.appendChild(div);
    if (scroll) scrollBottom();
  }

  function appendPrivateMsg({ from, to, text, time }, scroll = true) {
    const mine = from === myUsername;
    const div = document.createElement("div");
    div.className = `msg ${mine ? "mine" : "other"} private-msg private-badge`;
    div.innerHTML = `<div class="meta"><span class="from">${escHtml(from)}</span><span>${time || ""}</span></div>
      ${escHtml(text)}`;
    messagesEl.appendChild(div);
    if (scroll) scrollBottom();
  }

  function appendSystemMsg(text, time = "", scroll = true) {
    const div = document.createElement("div");
    div.className = "msg system-msg";
    div.textContent = `${text}${time ? " · " + time : ""}`;
    messagesEl.appendChild(div);
    if (scroll) scrollBottom();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send message ──────────────────────────────────────────────
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !active) return;
    if (active.type === "room") {
      wsSend({ type: "room_message", room: active.id, text });
    } else {
      wsSend({ type: "private", to: active.id, text });
    }
    msgInput.value = "";
    msgInput.style.height = "auto";
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  // Auto-grow textarea
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });

  // ── Login ─────────────────────────────────────────────────────
  function tryLogin() {
    const name = usernameInput.value.trim();
    if (!name) { loginError.textContent = "Please enter a username."; return; }
    loginError.textContent = "";
    connect();
    ws.onopen = () => wsSend({ type: "login", username: name });
  }

  loginBtn.addEventListener("click", tryLogin);
  usernameInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

  // ── Create room ───────────────────────────────────────────────
  newRoomBtn.addEventListener("click", () => {
    const name = newRoomInput.value.trim();
    if (!name) return;
    openRoom(name);
    newRoomInput.value = "";
  });
  newRoomInput.addEventListener("keydown", e => { if (e.key === "Enter") newRoomBtn.click(); });

  // ── XSS prevention ────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
